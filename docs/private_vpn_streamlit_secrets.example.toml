# Private VPN / Tailscale Linux server secrets template.
# Copy this file to .streamlit/secrets.toml on the server and fill values.
# This mode does not ask for passwords inside the app. VPN access is the outer
# access control layer, and users must choose a profile so annotations are not
# written as "default".

STORAGE_BACKEND = "hf"
DECISION_BACKEND = "firestore"
HF_DATASET_REPO = "ElectronicHug/short_video_ocr_dataset"
HF_TOKEN_READ = "<hf_read_token_if_needed>"

GCP_PROJECT_ID = "short-video-dataset-ocr"
FIRESTORE_COLLECTION = "funnel_decisions"
FIRESTORE_CLAIMS_COLLECTION = "funnel_claims"
FIRESTORE_TEXT_COLLECTION = "text_frame_annotations"
CLAIM_TTL_MINUTES = 30
TEXT_CLAIM_TTL_MINUTES = 60

# Use the minimal service account:
# external-annotation-app-writer@short-video-dataset-ocr.iam.gserviceaccount.com
# It should have only roles/datastore.user.
GCP_SERVICE_ACCOUNT_JSON = '''
{
  "type": "service_account",
  "project_id": "short-video-dataset-ocr",
  "private_key_id": "<private_key_id>",
  "private_key": "-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n",
  "client_email": "external-annotation-app-writer@short-video-dataset-ocr.iam.gserviceaccount.com",
  "client_id": "<client_id>",
  "auth_uri": "https://accounts.google.com/o/oauth2/auth",
  "token_uri": "https://oauth2.googleapis.com/token",
  "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
  "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/external-annotation-app-writer%40short-video-dataset-ocr.iam.gserviceaccount.com",
  "universe_domain": "googleapis.com"
}
'''

# Keep this stable across app restarts so profile selection can persist for 24h.
AUTH_COOKIE_SECRET = "<random_long_string_for_signed_profile_cookie>"
AUTH_MODE = "profile_only"

