# Streamlit Community Cloud secrets template.
# Copy this structure into "Manage app" -> "Settings" -> "Secrets".
# Do not commit real tokens, service-account JSON, logins, or passwords.

STORAGE_BACKEND = "hf"
DECISION_BACKEND = "firestore"
HF_DATASET_REPO = "ElectronicHug/short_video_ocr_dataset"
HF_TOKEN_READ = "<hf_read_token>"
GCP_PROJECT_ID = "short-video-dataset-ocr"
FIRESTORE_COLLECTION = "funnel_decisions"
GCP_SERVICE_ACCOUNT_JSON = """<full_service_account_json>"""

# Add one block per user. The table suffix is the login users type in the app.
[auth_users.login_1]
display_name = "<display name>"
role = "owner"
password = "<password>"

[auth_users.login_2]
display_name = "<display name>"
role = "annotator"
password = "<password>"

[auth_users.login_3]
display_name = "<display name>"
role = "public_annotator"
password = "<password>"
